name: mongo-sharding

services:

  # Конфигурационный сервер MongoDB
  mongo-config:
    image: mongo:latest
    container_name: mongo-config
    restart: always
    ports:
      - "27017:27017"
    networks:
      app-network:
        ipv4_address: 173.17.0.10
    volumes:
      - mongo-config-data:/data/db
    command:
      [
        "--configsvr",
        "--replSet",
        "config",
        "--bind_ip_all",
        "--port",
        "27017"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  # Шард 1 MongoDB
  mongo-shard-1:
    image: mongo:latest
    container_name: mongo-shard-1
    restart: always
    ports:
      - "27018:27018"
    networks:
      app-network:
        ipv4_address: 173.17.0.9
    volumes:
      - mongo-shard-1-data:/data/db
    command:
      [
        "--shardsvr",
        "--replSet",
        "shard-1",
        "--bind_ip_all",
        "--port",
        "27018"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  # Шард 2 MongoDB
  mongo-shard-2:
    image: mongo:latest
    container_name: mongo-shard-2
    restart: always
    ports:
      - "27019:27019"
    networks:
      app-network:
        ipv4_address: 173.17.0.8
    volumes:
      - mongo-shard-2-data:/data/db
    command:
      [
        "--shardsvr",
        "--replSet",
        "shard-2",
        "--bind_ip_all",
        "--port",
        "27019"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  # MongoDB Router (mongos)
  mongos-router:
    image: mongo:latest
    depends_on:
      - mongo-config
      - mongo-shard-1
      - mongo-shard-2
    container_name: mongos-router
    restart: always
    ports:
      - "27020:27020"
    networks:
      app-network:
        ipv4_address: 173.17.0.7
    command:
      [
        "mongos",
        "--configdb",
        "config/mongo-config:27017",
        "--bind_ip_all",
        "--port",
        "27020"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  # Приложение на Python
  pymongo-api:
    container_name: pymongo-api
    build:
      context: api_app
      dockerfile: Dockerfile
    networks:
      app-network:
        ipv4_address: 173.17.0.11
    image: kazhem/pymongo_api:1.0.0
    depends_on:
      - mongos-router
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongos-router:27020"
      MONGODB_DATABASE_NAME: "somedb"

# Сеть для контейнеров
networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 173.17.0.0/16

# Тома для хранения данных
volumes:
  mongo-config-data:
  mongo-shard-1-data:
  mongo-shard-2-data: