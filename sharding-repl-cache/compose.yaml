name: sharding-repl-cache

services:

  # Конфигурационный сервер MongoDB
  mongo-config:
    image: mongo:latest
    container_name: mongo-config
    restart: always
    ports:
      - "27017:27017"
    networks:
      app-network:
        ipv4_address: 173.17.0.10
    volumes:
      - mongo-config-data:/data/db
    command:
      [
        "--configsvr",
        "--replSet",
        "config",
        "--bind_ip_all",
        "--port",
        "27017"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  # Шард 1 MongoDB (replica 1)
  mongo-rs-0-1:
    image: mongo:latest
    container_name: mongo-rs-0-1
    restart: always
    ports:
      - "27018:27018"
    networks:
      app-network:
        ipv4_address: 173.17.0.9
    volumes:
      - mongo-rs-0-1-data:/data/db
    command:
      [
        "--shardsvr",
        "--replSet",
        "rs0",
        "--bind_ip_all",
        "--port",
        "27018"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  # Шард 1 MongoDB (replica 2)
  mongo-rs-0-2:
    image: mongo:latest
    container_name: mongo-rs-0-2
    restart: always
    ports:
      - "27019:27019"
    networks:
      app-network:
        ipv4_address: 173.17.0.8
    volumes:
      - mongo-rs-0-2-data:/data/db
    command:
      [
        "--shardsvr",
        "--replSet",
        "rs0",
        "--bind_ip_all",
        "--port",
        "27019"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  # Шард 1 MongoDB (replica 3)
  mongo-rs-0-3:
    image: mongo:latest
    container_name: mongo-rs-0-3
    restart: always
    ports:
      - "27020:27020"
    networks:
      app-network:
        ipv4_address: 173.17.0.7
    volumes:
      - mongo-rs-0-3-data:/data/db
    command:
      [
        "--shardsvr",
        "--replSet",
        "rs0",
        "--bind_ip_all",
        "--port",
        "27020"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  # Шард 2 MongoDB (replica 1)
  mongo-rs-1-1:
    image: mongo:latest
    container_name: mongo-rs-1-1
    restart: always
    ports:
      - "27021:27021"
    networks:
      app-network:
        ipv4_address: 173.17.0.6
    volumes:
      - mongo-rs-1-1-data:/data/db
    command:
      [
        "--shardsvr",
        "--replSet",
        "rs1",
        "--bind_ip_all",
        "--port",
        "27021"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  # Шард 2 MongoDB (replica 2)
  mongo-rs-1-2:
    image: mongo:latest
    container_name: mongo-rs-1-2
    restart: always
    ports:
      - "27022:27022"
    networks:
      app-network:
        ipv4_address: 173.17.0.5
    volumes:
      - mongo-rs-1-2-data:/data/db
    command:
      [
        "--shardsvr",
        "--replSet",
        "rs1",
        "--bind_ip_all",
        "--port",
        "27022"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  # Шард 2 MongoDB (replica 3)
  mongo-rs-1-3:
    image: mongo:latest
    container_name: mongo-rs-1-3
    restart: always
    ports:
      - "27023:27023"
    networks:
      app-network:
        ipv4_address: 173.17.0.4
    volumes:
      - mongo-rs-1-3-data:/data/db
    command:
      [
        "--shardsvr",
        "--replSet",
        "rs1",
        "--bind_ip_all",
        "--port",
        "27023"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  # MongoDB Router (mongos)
  mongos-router:
    image: mongo:latest
    depends_on:
      - mongo-config
      - mongo-rs-0-1
      - mongo-rs-0-2
      - mongo-rs-0-3
      - mongo-rs-1-1
      - mongo-rs-1-2
      - mongo-rs-1-3
    container_name: mongos-router
    restart: always
    ports:
      - "27024:27024"
    networks:
      app-network:
        ipv4_address: 173.17.0.3
    command:
      [
        "mongos",
        "--configdb",
        "config/mongo-config:27017",
        "--bind_ip_all",
        "--port",
        "27024"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  # Redis
  redis:
    image: "redis:latest"
    container_name: redis
    ports:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      app-network:
        ipv4_address: 173.17.0.14

  # Приложение на Python
  pymongo-api:
    container_name: pymongo-api
    build:
      context: api_app
      dockerfile: Dockerfile
    networks:
      app-network:
        ipv4_address: 173.17.0.11
    image: kazhem/pymongo_api:1.0.0
    depends_on:
      - mongos-router
      - redis
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongos-router:27024"
      MONGODB_DATABASE_NAME: "somedb"
      REDIS_URL: "redis://redis:6379"

# Сеть для контейнеров
networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 173.17.0.0/16

# Тома для хранения данных
volumes:
  mongo-config-data:
  mongo-rs-0-1-data:
  mongo-rs-0-2-data:
  mongo-rs-0-3-data:
  mongo-rs-1-1-data:
  mongo-rs-1-2-data:
  mongo-rs-1-3-data:
  redis_data: